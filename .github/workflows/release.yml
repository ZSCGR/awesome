name: Automated Release

# 触发条件：当 main 分支有代码推送（或 PR 合并）时自动运行
on:
  push:
    branches:
      - main
  workflow_dispatch: # 保留手动触发按钮，方便你在网页端随时手动补发版本

# 授予工作流向仓库写入 Commit、Tag 和 Release 的权限
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # 1. 签出代码
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }} # 必须使用你配置的具有写权限的私密 Token
          persist-credentials: true

      # 2. 设置安全的 Node 24 环境
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      # 3. 安装依赖（使用 --no-audit 提速，仅安装，不执行可疑的审计脚本）
      - name: Install dependencies
        run: npm i --no-audit

      # 4. 执行 ncc 编译，将最新代码融合成单文件 index.js
      - name: Build Code
        run: npm run build

      # 5. 核心防御：强行清洗工作区
      # 这样可以百分之百确保原作者配置的 backmerge 插件在自动反向合并（如 main 合回 dev）时，
      # 不会因为本地临时修改了 package-lock.json 而报“You have unstaged changes”导致的流产
      - name: Hard Clean Workspace for Backmerge
        run: |
          git checkout -- package-lock.json || true
          git status

      # 6. 自定义版本递增与推送逻辑（免去外部 Release 工具，100% 安全且自主可控）
      - name: Auto Version Bump & Push
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          # 1. 配置 Git 机器人身份
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 2. 读取最近一次的 Commit 消息，判断版本升级类型
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$COMMIT_MSG" | grep -iqE "BREAKING CHANGE|^[a-zA-Z0-9_-]+(\(.*\))?!:"; then
            BUMP_TYPE="major"
          elif echo "$COMMIT_MSG" | grep -iqE "^feat(\(.*\))?:"; then
            BUMP_TYPE="minor"
          elif echo "$COMMIT_MSG" | grep -iqE "^fix(\(.*\))?:"; then
            BUMP_TYPE="patch"
          else
            BUMP_TYPE="patch"
          fi
          
          echo "Latest commit message: $COMMIT_MSG"
          echo "Detected version bump type: $BUMP_TYPE"
          
          # 3. 自动递增 package.json 版本并创建提交（标记 [skip ci] 防止无限循环触发工作流）
          NEW_VERSION=$(npm version $BUMP_TYPE -m "chore(release): v%s [skip ci]")
          echo "New Version: $NEW_VERSION"
          
          # 4. 重新打包最新代码，确保 dist/index.js 是最新的
          npm run build
          
          # 5. 将 dist 编译产物合并追加提交到刚才的版本 commit 中，保持提交历史整洁
          git add dist/
          git commit --amend --no-edit
          
          # 6. 删除 npm version 默认在旧 Commit 上创建的旧 Tag，并在新 Commit (HEAD) 上重新打附注 Tag
          git tag -d "$NEW_VERSION"
          git tag -a "$NEW_VERSION" -m "Release $NEW_VERSION"
          
          # 7. 强制创建并更新大版本附注 Tag（例如 v1）
          MAJOR_VERSION=$(echo "$NEW_VERSION" | cut -d. -f1)
          git tag -f -a "$MAJOR_VERSION" -m "Release $MAJOR_VERSION"
          
          # 8. 强制推送 Commit 和所有的 tags
          git push origin main --tags --force
          
          # 9. 使用 GitHub 官方 CLI 自动创建 Release 发布包
          gh release create "$NEW_VERSION" --title "$NEW_VERSION" --notes "Release version $NEW_VERSION" || true